name: Build APK

on: push: branches: [ main ] workflow_dispatch: {}

jobs: build: runs-on: ubuntu-latest
steps:
  - uses: actions/checkout@v4

  - name: Set up Java
    uses: actions/setup-java@v4
    with:
      distribution: 'temurin'
      java-version: '17'

  - name: Install Flutter
    uses: subosito/flutter-action@v2
    with:
      flutter-version: 'stable'

  - name: Flutter pub get
    run: flutter pub get

  - name: Build APK (release)
    run: flutter build apk --release --obfuscate --split-debug-info=build/symbols || flutter build apk --release

  - name: Upload release APK
    uses: actions/upload-artifact@v4
    with:
      name: app-release-apk
      path: build/app/outputs/flutter-apk/app-release.apk

  - name: Build APK (debug)
    run: flutter build apk --debug

  - name: Upload debug APK
    uses: actions/upload-artifact@v4
    with:
      name: app-debug-apk
      path: build/app/outputs/flutter-apk/app-debug.apk

  - name: Print note
    run: |
      echo "If you want a signed release APK, add signing keys as GitHub secrets and update the workflow to sign the APK. The unsigned release APK is available as an artifact."
Add CI build workflow"
